<!DOCTYPE html>
<html lang="en">        
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Course</title>
    <link rel="stylesheet" href="style.css">
</head>
</html>
<body>
    
   
   <div class="add-course"> 
    <h1>Add Course</h1>
   </div>
    
  <section class="form">
    <form class="course-form">
        <label for="course-name">Course Name:</label>
        <select id="course-name" name="course-name" required>
            <option value="">Select a course</option>
            <option value="cs101">Introduction to Computer Science</option>
            <option value="math101">Calculus I</option>
            <option value="eng101">English Literature</option>
            <option value="phy101">Physics I</option>
        </select>
        <label for="course-code">Course Code:</label>
        <select id="course-code" name="course-code" required>
            <option value="">Select a course code</option>
            <option value="cs101">CS101</option>
            <option value="math101">MATH101</option>
            <option value="eng101">ENG101</option>
            <option value="phy101">PHY101</option>
        </select>

        <label for="credits">Credits:</label>
        <select id="credits" name="credits" required>
            <option value="">Select credits</option>
            <option value="3">3</option>
            <option value="4">4</option>
        </select>


        <label for="day">Day:</label>
        <select id="day" name="day" required>
            <option value="">Select a day</option>
            <option value="sunday">Sunday</option>
            <option value="monday">Monday</option>
            <option value="tuesday">Tuesday</option>
            <option value="wednesday">Wednesday</option>
            <option value="thursday">Thursday</option>
        </select>
    </section>
    <section class="button">   

        <button type="add">Add Course</button>
    </section>
    </form>
